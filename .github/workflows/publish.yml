name: Publish library to PyPI and update add-on

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-version:
    name: Check if version changed
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.version.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION and check against existing tags
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "v${VERSION}"; then
            echo "Version v${VERSION} already tagged — skipping publish."
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "New version v${VERSION} detected — will publish."
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

  publish-pypi:
    name: Build and publish to PyPI
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the tag
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: pip install build wheel

      - name: Substitute version in setup.py
        run: |
          sed -i "s/{{VERSION_PLACEHOLDER}}/${{ needs.check-version.outputs.version }}/g" setup.py

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Create and push git tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

  trigger-addon-update:
    name: Trigger add-on update
    needs: [check-version, publish-pypi]
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch update event to add-on repository
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SMART_BOILER_HA_API_TOKEN }}
          repository: grinwi/smartboiler-add-on
          event-type: library-updated
          client-payload: '{"version": "${{ needs.check-version.outputs.version }}"}'
